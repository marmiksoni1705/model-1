<!DOCTYPE html>
<html lang="en">
<head>
    <title>Header Footer</title>

    <style>

        body{
            margin: 0;
            font-family: Arial;
        }

       
        header{
            background-color: royalblue;
            color: white;
            text-align: center;
            padding: 20px;
        }

     
        nav{
            background-color: black;
            padding: 10px;
            text-align: center;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
        }

        nav a:hover{
            color: yellow;
        }

     
        section{
            padding: 40px;
            min-height: 300px;
        }

      
        footer{
            background-color: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }

    </style>
</head>

<body>

    
    <header>
        <h1>My E-COMMERCE Website</h1>
        <p>Welcome to My Page</p>
    </header>


    <nav>
        <a href="#">Home</a>
        <a href="oder.html">Oder</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

  
    <section>
        <h2>Main E-Commerce</h2>
        <p>This is a website is E-Commerce releted projrcted</p>
        
    </section>
    <footer>
        <h1>my  E-COMMERCE</h1>
    </footer>

</body>
</html>
