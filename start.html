    <script>

        $(document).ready(function(){

            let slides = $(".slides img");
            let index = 0;

          
            function showSlide(i){

                slides.removeClass("active");
                slides.eq(i).addClass("active");
            }

            $(".next").click(function(){

                index++;

                if(index >= slides.length){
                    index = 0;
                }

                showSlide(index);
            });

           
            $(".prev").click(function(){

                index--;

                if(index < 0){
                    index = slides.length - 1;
                }

                showSlide(index);
            });

      
            setInterval(function(){

                index++;

                if(index >= slides.length){
                    index = 0;
                }

                showSlide(index);

            },3000);

        });

    </script>
