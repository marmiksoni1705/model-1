<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Validation</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .p1{
            background-color: aquamarine;
            width: 500px;
            padding: 30px;
            margin: auto;
            border-radius: 10px;
            border: 1px solid black;
        }

        input[type="text"],
        input[type="number"],
        textarea{
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid black;
        }

        textarea{
            height: 100px;
        }

        select{
            width: 200px;
            height: 35px;
            border-radius: 10px;
            background-color: green;
            color: white;
            text-align: center;
        }

        button{
            width: 200px;
            height: 50px;
            border-radius: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover{
            background-color: white;
            color: black;
        }

    </style>
</head>

<body>

    <form class="p1" onsubmit="return validateForm()">

        <h2>Registration Form</h2>

        Name:<br>
        <input type="text" id="name" placeholder="Full Name"><br><br>

        Phone Number:<br>
        <input type="number" id="number" placeholder="Enter Phone Number"><br><br>

        Address:<br>
        <textarea id="address"></textarea><br><br>

        <h3>Gender</h3>

        <input type="radio" name="g" value="Male"> Male
        <input type="radio" name="g" value="Female"> Female

        <h3>Choose City</h3>

        <select id="city">
            <option value="">Select City</option>
            <option>Ahmedabad</option>
            <option>Surat</option>
            <option>Vadodara</option>
            <option>Rajkot</option>
        </select>

        <br><br>

        <button type="submit">Submit</button>

    </form>

    <script>

        function validateForm(){

            let name = document.getElementById("name").value;
            let number = document.getElementById("number").value;
            let address = document.getElementById("address").value;
            let city = document.getElementById("city").value;

            // Gender validation
            let gender = document.querySelector('input[name="g"]:checked');

            if(name == ""){
                alert("Please Enter Name");
                return false;
            }

            if(number == ""){
                alert("Please Enter Phone Number");
                return false;
            }

            if(number.length != 10){
                alert("Phone Number Must Be 10 Digits");
                return false;
            }

            if(address == ""){
                alert("Please Enter Address");
                return false;
            }

            if(gender == null){
                alert("Please Select Gender");
                return false;
            }

            if(city == ""){
                alert("Please Select City");
                return false;
            }

            alert("Form Submitted Successfully");

            window.location.href = "page2.html";

            return false;
        }

    </script>

</body>
</html>
