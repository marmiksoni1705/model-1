<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header Footer</title>

    <style>

        .header1{
            background-color: blue;
            color: white;
            text-align: center;
            align-content:center;
            margin-bottom: 50px;
            
        }
      
        .main-header{
            display:flex;
        }

        .header1{
            width:50%;
            background:blue;
            color:white;
            text-align:center;
            padding:20px;
        }

        .header2{
            width:50%;
            background:red;
            color:white;
            text-align:center;
            padding:40px;
        }
        footer{
            background-color: green;
            color: white;
            text-align: center;
            padding: 40px;
            margin-top: 60px;
        }
        

    </style>
</head>

<body>

    <header class="header1">
        <h1>AI with ChatGPT</h1>
    </header>

       <div class="main-header">

        <header class="header1">
            <h1>Left Header</h1>
        </header>

        <header class="header2">
            <h1>Right Header</h1>
        </header>

    </div>

    <footer>
        <h1>This is my footer first time</h1>
    </footer>

</body>
</html>
